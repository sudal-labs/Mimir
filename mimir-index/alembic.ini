[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# 런타임에 env.py가 환경 변수로 덮어쓰므로 여기에는 플레이스홀더만 남긴다.
sqlalchemy.url = postgresql+psycopg2://mimir:mimir@postgres:5432/mimir

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
